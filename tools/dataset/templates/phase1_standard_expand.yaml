# Phase 1 standard_complete expansion batch (38 cases) authored with make_case.
# Together with the 12 migrated 1b_* cases this reaches the section 13.4 target
# of 50 standard_complete cases. Every case is gated by make_case's Z3 self-check.
#
#   python -m tools.dataset.make_case \
#       --template tools/dataset/templates/phase1_standard_expand.yaml \
#       --out datasets/v2/phase1_master_cases.jsonl
#
# Capability reminders (configs/capability_model.yaml):
#   recon  -> fleet 1,3,4,5,7,8,9,11,12   strike -> 1,2,4,6,8,9,10,12   jam -> 3,7,11,12
#   max_ammo: fleet_1=4 fleet_2=6 fleet_4=5 fleet_9=2 ...   strike costs 1 ammo each.
