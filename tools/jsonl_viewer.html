<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSONL Dataset Viewer</title>
<style>
:root {
  --bg: #1e1e2e;
  --surface: #282840;
  --surface2: #32325a;
  --text: #cdd6f4;
  --text2: #a6adc8;
  --accent: #89b4fa;
  --green: #a6e3a1;
  --red: #f38ba8;
  --yellow: #f9e2af;
  --border: #45475a;
  --key: #89b4fa;
  --string: #a6e3a1;
  --number: #fab387;
  --bool: #cba6f7;
  --null: #6c7086;
  --tag-bg: #363654;
  --scrollbar: #45475a;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Segoe UI', 'SF Mono', 'Cascadia Code', Consolas, monospace;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── Header ── */
header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 10px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
  flex-wrap: wrap;
}
header h1 { font-size: 16px; font-weight: 600; white-space: nowrap; }
header .file-name { color: var(--text2); font-size: 12px; max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.btn {
  background: var(--surface2);
  color: var(--text);
  border: 1px solid var(--border);
  padding: 6px 12px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
  font-family: inherit;
  white-space: nowrap;
  transition: background .15s;
}
.btn:hover { background: var(--border); }
.btn.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }
.btn:disabled { opacity: 0.45; cursor: not-allowed; }
.btn:disabled:hover { background: var(--surface2); }

/* ── Main Layout ── */
main {
  display: flex;
  flex: 1;
  min-height: 0;   /* fix flexbox scroll: allow shrinking below content height */
  overflow: hidden;
}

/* ── Sidebar ── */
aside {
  width: 320px;
  min-width: 260px;
  min-height: 0;     /* fix flexbox scroll */
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  resize: horizontal;
}
.search-bar {
  padding: 10px;
  border-bottom: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 6px;
  flex-shrink: 0;
  max-height: 35vh;
  overflow-y: auto;
}
.search-bar input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 6px 10px;
  border-radius: 6px;
  font-size: 12px;
  font-family: inherit;
  outline: none;
}
.search-bar input:focus { border-color: var(--accent); }
.filter-row {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
}
.quick-row {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
}
.quick-row .btn { padding: 4px 8px; font-size: 10px; }
.tag-chip {
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 10px;
  background: var(--tag-bg);
  border: 1px solid var(--border);
  color: var(--text2);
  cursor: pointer;
  white-space: nowrap;
  transition: all .15s;
}
.tag-chip.selected { background: var(--accent); color: var(--bg); border-color: var(--accent); }
.sample-list {
  flex: 1;
  min-height: 0;    /* fix flexbox scroll */
  overflow-y: auto;
  padding: 4px;
}
.sample-item {
  padding: 8px 10px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 11px;
  border-left: 3px solid transparent;
  margin: 2px 0;
  transition: background .1s;
}
.sample-item:hover { background: var(--surface2); }
.sample-item.active { background: var(--surface2); border-left-color: var(--accent); }
.sample-item .sid { font-weight: 600; color: var(--accent); font-size: 11px; }
.sample-item .meta { color: var(--text2); font-size: 10px; margin-top: 2px; }
.sample-item .snippet { color: var(--text2); font-size: 10px; margin-top: 3px; line-height: 1.35; }
.sample-item .tags-row { display: flex; gap: 3px; flex-wrap: wrap; margin-top: 3px; }
.sample-item .mini-tag {
  font-size: 9px; padding: 1px 6px; border-radius: 8px;
  background: var(--tag-bg); color: var(--text2);
}
.result-pass { border-left-color: var(--green) !important; }
.result-fail { border-left-color: var(--red) !important; }
.result-error { border-left-color: var(--red) !important; background: rgba(243,139,168,0.06); }
.result-sat { border-left-color: var(--green) !important; }
.result-unsat { border-left-color: var(--red) !important; }
.result-complete { border-left-color: var(--green) !important; }
.result-incomplete { border-left-color: var(--yellow) !important; }
.result-ambiguous { border-left-color: var(--yellow) !important; }

/* ── Content Panel ── */
#content-panel {
  flex: 1;
  min-width: 0;       /* fix flexbox scroll (horizontal) */
  min-height: 0;       /* fix flexbox scroll (vertical) */
  overflow-y: auto;
}
#content-inner {
  display: flex;
  flex-direction: column;
  gap: 12px;
  padding: 16px;
  min-height: 100%;    /* fill panel when content is short */
}
.placeholder {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text2);
  font-size: 14px;
  text-align: center;
  line-height: 1.8;
}
.drop-zone {
  border: 2px dashed var(--border);
  border-radius: 12px;
  padding: 40px;
  text-align: center;
  color: var(--text2);
  transition: border-color .2s;
}
.drop-zone.drag-over { border-color: var(--accent); color: var(--accent); }
#content-panel.drag-over { outline: 3px dashed var(--accent); outline-offset: -8px; }

/* ── Sample Card ── */
.sample-card {
  background: var(--surface);
  border-radius: 10px;
  border: 1px solid var(--border);
  overflow: hidden;
}
.card-header {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 8px;
}
.card-title { font-size: 14px; font-weight: 600; }
.card-badges { display: flex; gap: 6px; flex-wrap: wrap; }
.badge {
  font-size: 10px; padding: 3px 10px; border-radius: 10px;
  font-weight: 600; text-transform: uppercase;
}
.badge-sat { background: rgba(166,227,161,0.15); color: var(--green); }
.badge-unsat { background: rgba(243,139,168,0.15); color: var(--red); }
.badge-complete { background: rgba(166,227,161,0.15); color: var(--green); }
.badge-incomplete { background: rgba(249,226,175,0.15); color: var(--yellow); }
.badge-ambiguous { background: rgba(249,226,175,0.15); color: var(--yellow); }
.badge-pass, .badge-true { background: rgba(166,227,161,0.15); color: var(--green); }
.badge-fail, .badge-false, .badge-error { background: rgba(243,139,168,0.15); color: var(--red); }
.badge-neutral { background: var(--tag-bg); color: var(--text2); text-transform: none; }
.card-body { padding: 4px 0; }

/* ── JSON Tree ── */
.json-tree {
  font-family: 'Cascadia Code', 'SF Mono', 'Fira Code', Consolas, monospace;
  font-size: 12.5px;
  line-height: 1.55;
}

/* Each nesting level gets its own guide-line block */
.json-node { }

/* Collapse: hide children, rotate chevron */
.json-node.collapsed > .json-children { display: none; }
.json-node.collapsed > .json-line-open > .json-toggle { transform: rotate(-90deg); }

/* ── Toggle chevron ── */
.json-toggle {
  cursor: pointer;
  user-select: none;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 18px;
  height: 18px;
  flex-shrink: 0;
  color: var(--text2);
  transition: transform 0.18s ease;
  position: relative;
  top: 1px;
}
.json-toggle::after {
  content: '';
  display: block;
  width: 0;
  height: 0;
  border-left: 4.5px solid transparent;
  border-right: 4.5px solid transparent;
  border-top: 5.5px solid currentColor;
  border-radius: 1px;
}
.json-toggle.leaf { visibility: hidden; }

/* ── Lines ── */
.json-line {
  display: flex;
  align-items: flex-start;
  padding: 2px 8px 2px 4px;
  border-radius: 4px;
  cursor: default;
  overflow-wrap: break-word;
  white-space: pre-wrap;
  transition: background 0.12s;
}
.json-line:hover { background: rgba(137, 180, 250, 0.07); }

/* Opening bracket line (toggle + bracket + pill) */
.json-line-open { padding-left: 2px; }

/* Closing bracket line — aligns flush with opening */
.json-line-close {
  padding-left: 2px;
}

/* ── Guide lines (indent via nested .json-children) ── */
.json-children {
  margin-left: 9px;
  padding-left: 14px;
  border-left: 1px solid var(--border);
}

/* ── Keys ── */
.json-key {
  color: #80cbc4;        /* teal-ish — easy on eyes */
  margin-right: 4px;
  flex-shrink: 0;
}
/* Depth-based key tints */
.json-line-entry .json-key { color: #89b4fa; }          /* lvl ≥1 — cornflower blue */
.json-children .json-line-entry .json-key { color: #82aaff; }
.json-children .json-children .json-line-entry .json-key { color: #80cbc4; }
.json-children .json-children .json-children .json-line-entry .json-key { color: #89ddff; }
.json-children .json-children .json-children .json-children .json-line-entry .json-key { color: #c3e88d; }
/* Index keys (array indices) */
.json-key-index { color: var(--text2); font-size: 11px; min-width: 20px; }

.json-kv-sep { color: var(--text2); margin: 0 4px; flex-shrink: 0; }

/* ── Values ── */
.json-val-string { color: #c3e88d; }           /* soft green */
.json-val-number { color: #f78c6c; }           /* warm orange */
.json-val-bool   { color: #c792ea; }           /* lavender */
.json-val-null   { color: #636f80; font-style: italic; }

/* ── Brackets ── */
.json-bracket { color: #6c7086; }              /* subtle gray */
.json-bracket-empty { color: #6c7086; font-style: italic; }

/* ── Comma ── */
.json-comma { color: #6c7086; flex-shrink: 0; }

/* ── Type pill (count badge) ── */
.json-type-pill {
  display: inline-block;
  font-size: 9.5px;
  padding: 0.5px 8px;
  margin-left: 6px;
  border-radius: 10px;
  background: var(--surface2);
  color: #7a8196;
  font-weight: 400;
  letter-spacing: 0.2px;
  line-height: 1.6;
  vertical-align: middle;
}

/* Truncation hint */
.json-trunc-hint {
  font-size: 10px;
  color: #7a8196;
  margin-left: 4px;
  font-style: italic;
}

/* ── Expandable long string ── */
.json-str-wrapper {
  display: inline-flex;
  flex-wrap: wrap;
  align-items: baseline;
  vertical-align: top;
}
/* The mini toggle triangle, same visual language as node toggle */
.json-str-toggle {
  cursor: pointer;
  user-select: none;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 16px;
  height: 16px;
  flex-shrink: 0;
  color: var(--accent);
  margin-right: 2px;
  position: relative;
  top: 2px;
  transform: rotate(-90deg);   /* collapsed → points right ▶ */
  transition: transform 0.18s ease;
}
.json-str-toggle::after {
  content: '';
  display: block;
  width: 0;
  height: 0;
  border-left: 4px solid transparent;
  border-right: 4px solid transparent;
  border-top: 5px solid currentColor;
  border-radius: 1px;
}
.json-str-wrapper.expanded .json-str-toggle {
  transform: rotate(0deg);    /* expanded → points down ▼ */
}
/* Preview (truncated) — hidden when expanded */
.json-str-preview { display: inline; }
.json-str-wrapper.expanded .json-str-preview { display: none; }
/* Pill hidden when expanded */
.json-str-wrapper.expanded > .json-type-pill { display: none; }
/* Full string block — hidden by default, shown when expanded */
.json-str-full {
  display: none;
  margin-top: 2px;
  width: 100%;
}
.json-str-wrapper.expanded .json-str-full {
  display: block;
}
.json-str-full pre {
  margin: 4px 0 6px 0;
  padding: 10px 14px;
  background: var(--bg);
  border-left: 3px solid var(--accent);
  border-radius: 0 6px 6px 0;
  font-family: 'Cascadia Code', 'SF Mono', 'Fira Code', Consolas, monospace;
  font-size: 11.5px;
  line-height: 1.6;
  color: var(--text);
  white-space: pre-wrap;
  word-break: break-word;
  overflow-x: auto;
  max-height: 480px;
  overflow-y: auto;
}

/* ── Navigation ── */
.nav-row {
  display: flex; gap: 8px; align-items: center; padding: 8px 0;
}
.nav-row .btn { font-size: 11px; }
.nav-row .pos { color: var(--text2); font-size: 12px; }

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text2); }

/* ── Summary view ── */
.summary-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 8px;
}
.summary-item {
  background: var(--surface2);
  padding: 8px 12px;
  border-radius: 6px;
  font-size: 11px;
}
.summary-item .label { color: var(--text2); font-size: 9px; text-transform: uppercase; letter-spacing: 0.5px; }
.summary-item .value { color: var(--text); margin-top: 2px; word-break: break-all; }
.summary-item.pass { border-left: 3px solid var(--green); }
.summary-item.fail { border-left: 3px solid var(--red); }
.summary-item.warn { border-left: 3px solid var(--yellow); }
.summary-value-list { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
.kv-pill {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 2px 7px;
  border-radius: 10px;
  background: var(--tag-bg);
  color: var(--text2);
  font-size: 10px;
}
.kv-pill.true { color: var(--green); background: rgba(166,227,161,0.12); }
.kv-pill.false { color: var(--red); background: rgba(243,139,168,0.12); }
.error-text {
  color: var(--red);
  white-space: pre-wrap;
  word-break: break-word;
  line-height: 1.45;
}

/* ── Stats bar ── */
.stats-bar {
  padding: 6px 12px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  gap: 16px;
  font-size: 11px;
  color: var(--text2);
  flex-shrink: 0;
  flex-wrap: wrap;
}
.stats-bar span { white-space: nowrap; }
.stats-bar .num { color: var(--accent); font-weight: 600; }

@media (max-width: 768px) {
  aside { width: 100% !important; min-width: 0; max-height: 40vh; }
  main { flex-direction: column; }
}

/* FLATTENED TABLE VIEW */
.flat-table { width: 100%; border-collapse: collapse; font-size: 11px; }
.flat-table th { text-align: left; padding: 6px 8px; border-bottom: 2px solid var(--border); color: var(--text2); font-size: 10px; text-transform: uppercase; position: sticky; top: 0; background: var(--surface); z-index: 1; }
.flat-table td { padding: 5px 8px; border-bottom: 1px solid var(--border); vertical-align: top; }
.flat-table tr:hover td { background: rgba(255,255,255,0.03); }
.flat-table .cell-id { color: var(--accent); font-weight: 600; }
.flat-table .cell-tag { font-size: 9px; padding: 1px 6px; border-radius: 8px; background: var(--tag-bg); color: var(--text2); display: inline-block; margin: 1px; }
.flat-table .value-cell { max-width: 780px; white-space: pre-wrap; word-break: break-word; }
.raw-pre {
  white-space: pre-wrap;
  word-break: break-word;
  font-size: 11px;
  line-height: 1.6;
  padding: 10px 14px;
}
.parse-error-box {
  padding: 8px 12px;
  margin: 0 0 8px;
  border-left: 3px solid var(--yellow);
  background: rgba(249,226,175,0.08);
  color: var(--yellow);
  font-size: 11px;
  line-height: 1.45;
}
</style>
</head>
<body>

<header>
  <h1>📊 JSONL Dataset Viewer</h1>
  <span class="file-name" id="current-file">— 未加载文件 —</span>
  <button class="btn" onclick="document.getElementById('file-input').click()" title="选择 JSONL 文件">📂 打开文件</button>
  <input type="file" id="file-input" accept=".jsonl,.json,.yaml,.yml" hidden onchange="loadFile(event)">
  <button class="btn" id="btn-tree" onclick="setView('tree')">🌳 树形视图</button>
  <button class="btn" id="btn-flat" onclick="setView('flat')">📋 表状视图</button>
  <button class="btn" id="btn-raw" onclick="setView('raw')">{ } Raw JSON</button>
  <button class="btn" onclick="clearFilters()">清除过滤</button>
  <button class="btn" onclick="exportFiltered()">💾 导出过滤结果</button>
</header>

<div class="stats-bar" id="stats-bar" style="display:none">
  <span>总计: <span class="num" id="stat-total">0</span> 条</span>
  <span>过滤: <span class="num" id="stat-filtered">0</span> 条</span>
  <span>通过: <span class="num" id="stat-pass" style="color:var(--green)">0</span></span>
  <span>失败: <span class="num" id="stat-fail" style="color:var(--red)">0</span></span>
  <span>错误: <span class="num" id="stat-error" style="color:var(--red)">0</span></span>
  <span>解析错误: <span class="num" id="stat-parse-errors" style="color:var(--yellow)">0</span></span>
</div>

<main>
  <aside>
    <div class="search-bar">
      <input type="text" id="search-input" placeholder="搜索关键词，或 evaluation.first_pass:false / error:ValueError" oninput="applyFilter()">
      <div class="quick-row">
        <button class="btn active" id="quick-all" onclick="setQuickFilter('all')">全部</button>
        <button class="btn" id="quick-pass" onclick="setQuickFilter('pass')">通过</button>
        <button class="btn" id="quick-fail" onclick="setQuickFilter('fail')">失败</button>
        <button class="btn" id="quick-error" onclick="setQuickFilter('error')">错误</button>
      </div>
      <div class="filter-row" id="tag-filters"></div>
    </div>
    <div class="sample-list" id="sample-list"></div>
  </aside>
  <div id="content-panel">
    <div id="content-inner">
      <div class="placeholder drop-zone" id="drop-zone">
        <div style="font-size:48px;margin-bottom:12px;">📁</div>
        <div>拖拽 .jsonl / .json / .yaml 文件到此处<br>或点击 <b>📂 打开文件</b> 按钮</div>
        <div style="font-size:11px;margin-top:8px;color:var(--text2)">支持 datasets JSONL、reports JSON、metrics.json records、YAML cases</div>
      </div>
    </div>
  </div>
</main>

<script>
// ── State ──
let allSamples = [];
let filteredIndices = [];
let currentIndex = -1;
let currentView = 'tree';
let selectedTags = new Set();
let allTags = new Set();
let recordSources = [];
let searchCache = [];
let lastParseErrors = [];
let quickFilter = 'all';
let domIdSeq = 0;

// ── File Loading (bind to content panel: it uses inner wrapper, so listeners survive re-render) ──
const contentPanel = document.getElementById('content-panel');
contentPanel.addEventListener('dragover', e => { e.preventDefault(); contentPanel.classList.add('drag-over'); });
contentPanel.addEventListener('dragleave', e => {
  // Only remove class when actually leaving the panel, not entering a child
  if (!contentPanel.contains(e.relatedTarget)) contentPanel.classList.remove('drag-over');
});
contentPanel.addEventListener('drop', e => {
  e.preventDefault();
  contentPanel.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file) readFile(file);
});

function loadFile(event) {
  const file = event.target.files[0];
  if (file) readFile(file);
}

async function readFile(file) {
  const text = await file.text();
  const parsed = parseInputText(text, file.name);
  allSamples = parsed.records;
  recordSources = parsed.sources;
  lastParseErrors = parsed.parseErrors;
  allTags.clear();
  selectedTags.clear();
  quickFilter = 'all';
  allSamples.forEach(s => collectSampleTags(s).forEach(t => allTags.add(t)));
  searchCache = allSamples.map(s => (JSON.stringify(s) + ' ' + [...collectSampleTags(s)].join(' ')).toLowerCase());

  if (lastParseErrors.length > 0) {
    console.warn(`解析失败 ${lastParseErrors.length} 行:`, lastParseErrors);
  }

  document.getElementById('current-file').textContent = file.name + ` (${allSamples.length} 条, ${parsed.kind})`;
  document.getElementById('stats-bar').style.display = 'flex';
  updateQuickButtons();
  updateStats();
  buildTagFilters();
  applyFilterNow();  // immediate on load (skip debounce)
}

function parseInputText(text, fileName = '') {
  const cleaned = text.replace(/^\uFEFF/, '');
  const trimmed = cleaned.trim();
  if (!trimmed) return {records: [], sources: [], parseErrors: [], kind: 'empty'};
  const ext = fileName.toLowerCase().split('.').pop();
  const yamlLike = ext === 'yaml' || ext === 'yml' || looksLikeYamlText(trimmed);

  if (yamlLike) {
    try {
      const parsed = parseYamlSubset(cleaned);
      const extracted = extractRecordsFromJson(parsed, 'yaml');
      return {
        records: extracted.records,
        sources: extracted.sources,
        parseErrors: [],
        kind: extracted.kind,
      };
    } catch (e) {
      return {
        records: [],
        sources: [],
        parseErrors: [`YAML 解析失败: ${e.message}`],
        kind: 'yaml',
      };
    }
  }

  if (trimmed[0] === '{' || trimmed[0] === '[') {
    try {
      const parsed = JSON.parse(trimmed);
      const extracted = extractRecordsFromJson(parsed, 'json');
      if (extracted.records.length > 0) {
        return {
          records: extracted.records,
          sources: extracted.sources,
          parseErrors: [],
          kind: extracted.kind,
        };
      }
    } catch (e) {
      // Fall through to JSONL parsing; pretty JSON errors will still be surfaced per line.
    }
  }

  const lines = cleaned.split(/\r?\n/);
  const records = [];
  const sources = [];
  const parseErrors = [];
  lines.forEach((line, lineIndex) => {
    if (!line.trim()) return;
    try {
      records.push(JSON.parse(line));
      sources.push(`line ${lineIndex + 1}`);
    } catch (e) {
      parseErrors.push(`第 ${lineIndex + 1} 行: ${e.message}`);
    }
  });
  return {records, sources, parseErrors, kind: 'jsonl'};
}

function extractRecordsFromJson(value, kindHint = 'json') {
  if (Array.isArray(value)) {
    return {records: value, sources: value.map((_, i) => `$[${i}]`), kind: `${kindHint} array`};
  }

  if (looksLikeRecord(value)) {
    return {records: [value], sources: ['$'], kind: `single ${kindHint} record`};
  }

  if (value && typeof value === 'object' && Array.isArray(value.cases)) {
    return {
      records: value.cases,
      sources: value.cases.map((_, i) => `$.cases[${i}]`),
      kind: `${kindHint} cases`,
    };
  }

  const records = [];
  const sources = [];
  collectNamedRecords(value, '$', records, sources);
  if (records.length > 0) {
    return {records, sources, kind: `${kindHint} records`};
  }

  return {records: [value], sources: ['$'], kind: `${kindHint} object`};
}

function collectNamedRecords(value, path, records, sources) {
  if (!value || typeof value !== 'object') return;
  if (Array.isArray(value)) {
    value.forEach((item, i) => collectNamedRecords(item, `${path}[${i}]`, records, sources));
    return;
  }

  for (const [key, val] of Object.entries(value)) {
    const nextPath = `${path}.${key}`;
    if (key === 'records' && Array.isArray(val)) {
      val.forEach((item, i) => {
        records.push(item);
        sources.push(`${nextPath}[${i}]`);
      });
    } else if (val && typeof val === 'object') {
      collectNamedRecords(val, nextPath, records, sources);
    }
  }
}

function looksLikeRecord(value) {
  return !!(value && typeof value === 'object' && !Array.isArray(value) && (
    value.sample_id ||
    value.evaluation ||
    value.case ||
    value.generation ||
    value.expected_result ||
    value.expected_status
  ));
}

function looksLikeYamlText(trimmed) {
  if (trimmed.startsWith('{') || trimmed.startsWith('[')) return false;
  return /^(cases|records|[A-Za-z_][\w-]*)\s*:/m.test(trimmed);
}

function parseYamlSubset(text) {
  const lines = prepareYamlLines(text);
  if (lines.length === 0) return {};
  const parsed = parseYamlBlock(lines, 0, lines[0].indent);
  if (parsed.index < lines.length) {
    throw new Error(`第 ${lines[parsed.index].line} 行附近存在无法归属的缩进块`);
  }
  return parsed.value ?? {};
}

function prepareYamlLines(text) {
  return text.split(/\r?\n/).map((raw, i) => {
    const withoutComment = stripYamlComment(raw).replace(/\s+$/, '');
    if (!withoutComment.trim()) return null;
    if (/^\t+/.test(withoutComment)) {
      throw new Error(`第 ${i + 1} 行使用了 tab 缩进`);
    }
    return {
      indent: withoutComment.match(/^ */)[0].length,
      text: withoutComment.trim(),
      line: i + 1,
    };
  }).filter(Boolean);
}

function parseYamlBlock(lines, index, indent) {
  if (index >= lines.length) return {value: null, index};
  if (lines[index].text.startsWith('- ')) {
    return parseYamlArray(lines, index, indent);
  }
  return parseYamlObject(lines, index, indent);
}

function parseYamlArray(lines, index, indent) {
  const arr = [];
  let i = index;
  while (i < lines.length) {
    const line = lines[i];
    if (line.indent < indent) break;
    if (line.indent > indent || !line.text.startsWith('- ')) break;

    const rest = line.text.slice(2).trim();
    i += 1;
    if (!rest) {
      if (i < lines.length && lines[i].indent > line.indent) {
        const child = parseYamlBlock(lines, i, lines[i].indent);
        arr.push(child.value);
        i = child.index;
      } else {
        arr.push(null);
      }
      continue;
    }

    const colon = findTopLevelChar(rest, ':');
    if (colon >= 0) {
      const obj = {};
      const key = parseYamlKey(rest.slice(0, colon), line.line);
      const valueText = rest.slice(colon + 1).trim();
      obj[key] = valueText ? parseYamlValue(valueText, line.line) : null;

      if (i < lines.length && lines[i].indent > line.indent) {
        const child = parseYamlBlock(lines, i, lines[i].indent);
        if (child.value && typeof child.value === 'object' && !Array.isArray(child.value)) {
          Object.assign(obj, child.value);
        } else {
          obj.value = child.value;
        }
        i = child.index;
      }
      arr.push(obj);
    } else {
      arr.push(parseYamlValue(rest, line.line));
    }
  }
  return {value: arr, index: i};
}

function parseYamlObject(lines, index, indent) {
  const obj = {};
  let i = index;
  while (i < lines.length) {
    const line = lines[i];
    if (line.indent < indent) break;
    if (line.indent > indent || line.text.startsWith('- ')) break;

    const {key, valueText} = splitYamlKeyValue(line.text, line.line);
    i += 1;
    if (valueText) {
      obj[key] = parseYamlValue(valueText, line.line);
    } else if (i < lines.length && lines[i].indent > line.indent) {
      const child = parseYamlBlock(lines, i, lines[i].indent);
      obj[key] = child.value;
      i = child.index;
    } else {
      obj[key] = null;
    }
  }
  return {value: obj, index: i};
}

function splitYamlKeyValue(text, lineNo) {
  const colon = findTopLevelChar(text, ':');
  if (colon < 0) throw new Error(`第 ${lineNo} 行缺少键值冒号`);
  return {
    key: parseYamlKey(text.slice(0, colon), lineNo),
    valueText: text.slice(colon + 1).trim(),
  };
}

function parseYamlKey(text, lineNo) {
  const key = parseYamlValue(text.trim(), lineNo);
  if (key == null || typeof key === 'object') {
    throw new Error(`第 ${lineNo} 行存在不支持的 YAML key`);
  }
  return String(key);
}

function parseYamlValue(text, lineNo) {
  const value = text.trim();
  if (value === '') return null;
  if (value === '[]') return [];
  if (value === '{}') return {};
  if (value.startsWith('[')) return parseYamlFlowArray(value, lineNo);
  if (value.startsWith('{')) return parseYamlFlowObject(value, lineNo);
  if ((value.startsWith('"') && value.endsWith('"')) || (value.startsWith("'") && value.endsWith("'"))) {
    return parseYamlQuoted(value, lineNo);
  }

  const lower = value.toLowerCase();
  if (lower === 'true') return true;
  if (lower === 'false') return false;
  if (lower === 'null' || lower === '~') return null;
  if (/^[+-]?\d+(?:\.\d+)?(?:e[+-]?\d+)?$/i.test(value)) return Number(value);
  return value;
}

function parseYamlFlowArray(text, lineNo) {
  if (!text.endsWith(']')) throw new Error(`第 ${lineNo} 行存在未闭合的 flow list`);
  const inner = text.slice(1, -1).trim();
  if (!inner) return [];
  return splitTopLevel(inner, ',').map(part => parseYamlValue(part, lineNo));
}

function parseYamlFlowObject(text, lineNo) {
  if (!text.endsWith('}')) throw new Error(`第 ${lineNo} 行存在未闭合的 flow object`);
  const inner = text.slice(1, -1).trim();
  if (!inner) return {};
  const obj = {};
  splitTopLevel(inner, ',').forEach(part => {
    const colon = findTopLevelChar(part, ':');
    if (colon < 0) throw new Error(`第 ${lineNo} 行 flow object 缺少冒号`);
    const key = parseYamlKey(part.slice(0, colon), lineNo);
    obj[key] = parseYamlValue(part.slice(colon + 1), lineNo);
  });
  return obj;
}

function parseYamlQuoted(value, lineNo) {
  if (value.startsWith('"')) {
    try {
      return JSON.parse(value);
    } catch (e) {
      throw new Error(`第 ${lineNo} 行双引号字符串不合法: ${e.message}`);
    }
  }
  return value.slice(1, -1).replace(/''/g, "'");
}

function stripYamlComment(line) {
  let quote = '';
  let escape = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (quote) {
      if (quote === '"' && c === '\\' && !escape) {
        escape = true;
        continue;
      }
      if (c === quote && !escape) quote = '';
      escape = false;
      continue;
    }
    if (c === '"' || c === "'") {
      quote = c;
      continue;
    }
    if (c === '#') return line.slice(0, i);
  }
  return line;
}

function splitTopLevel(text, delimiter) {
  const parts = [];
  let start = 0;
  let depth = 0;
  let quote = '';
  let escape = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (quote) {
      if (quote === '"' && c === '\\' && !escape) {
        escape = true;
        continue;
      }
      if (c === quote && !escape) quote = '';
      escape = false;
      continue;
    }
    if (c === '"' || c === "'") {
      quote = c;
    } else if (c === '[' || c === '{') {
      depth += 1;
    } else if (c === ']' || c === '}') {
      depth -= 1;
    } else if (c === delimiter && depth === 0) {
      parts.push(text.slice(start, i).trim());
      start = i + 1;
    }
  }
  parts.push(text.slice(start).trim());
  return parts.filter(part => part.length > 0);
}

function findTopLevelChar(text, target) {
  let depth = 0;
  let quote = '';
  let escape = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (quote) {
      if (quote === '"' && c === '\\' && !escape) {
        escape = true;
        continue;
      }
      if (c === quote && !escape) quote = '';
      escape = false;
      continue;
    }
    if (c === '"' || c === "'") {
      quote = c;
    } else if (c === '[' || c === '{') {
      depth += 1;
    } else if (c === ']' || c === '}') {
      depth -= 1;
    } else if (c === target && depth === 0) {
      return i;
    }
  }
  return -1;
}

// ── Stats ──
function updateStats() {
  const pass = allSamples.filter(isPass).length;
  const errors = allSamples.filter(hasHardError).length;
  const fail = allSamples.filter(isFail).length;
  document.getElementById('stat-total').textContent = allSamples.length;
  document.getElementById('stat-filtered').textContent = filteredIndices.length;
  document.getElementById('stat-pass').textContent = pass;
  document.getElementById('stat-fail').textContent = fail;
  document.getElementById('stat-error').textContent = errors;
  document.getElementById('stat-parse-errors').textContent = lastParseErrors.length;
}

// ── Tag Filters ──
function buildTagFilters() {
  const container = document.getElementById('tag-filters');
  container.innerHTML = '';
  const counts = new Map();
  allSamples.forEach(s => {
    collectSampleTags(s).forEach(t => counts.set(t, (counts.get(t) || 0) + 1));
  });
  const sorted = [...allTags].sort((a, b) => {
    const pa = tagPriority(a), pb = tagPriority(b);
    if (pa !== pb) return pa - pb;
    return a.localeCompare(b);
  });
  sorted.forEach(tag => {
    const chip = document.createElement('span');
    chip.className = 'tag-chip' + (selectedTags.has(tag) ? ' selected' : '');
    chip.textContent = `${tag} (${counts.get(tag) || 0})`;
    chip.onclick = () => {
      if (selectedTags.has(tag)) selectedTags.delete(tag); else selectedTags.add(tag);
      chip.classList.toggle('selected');
      applyFilterNow();
    };
    container.appendChild(chip);
  });
}

function tagPriority(tag) {
  if (tag === 'pass' || tag === 'fail') return 0;
  if (tag.startsWith('error:')) return 1;
  if (tag.startsWith('ev:first_pass')) return 2;
  if (tag.startsWith('ev:')) return 3;
  if (tag.startsWith('result:') || tag.startsWith('status:')) return 4;
  return 9;
}

// ── Filter ──
let filterTimer = null;
function applyFilter() {
  clearTimeout(filterTimer);
  filterTimer = setTimeout(applyFilterNow, 200);
}
function applyFilterNow() {
  const query = (document.getElementById('search-input').value || '').trim();
  filteredIndices = [];
  allSamples.forEach((s, i) => {
    if (quickFilter === 'pass' && !isPass(s)) return;
    if (quickFilter === 'fail' && !isFail(s)) return;
    if (quickFilter === 'error' && !hasHardError(s)) return;

    // tag filter
    if (selectedTags.size > 0) {
      const sampleTags = collectSampleTags(s);
      let match = false;
      for (const st of selectedTags) {
        if (sampleTags.has(st)) { match = true; break; }
      }
      if (!match) return;
    }
    // text search
    if (query && !matchesQuery(s, i, query)) return;
    filteredIndices.push(i);
  });
  updateStats();
  renderSampleList();
  if (filteredIndices.length > 0 && !filteredIndices.includes(currentIndex)) {
    selectSample(filteredIndices[0]);
  } else if (filteredIndices.length === 0) {
    currentIndex = -1;
    document.getElementById('content-inner').innerHTML =
      `${lastParseErrors.length ? renderParseErrors() : ''}<div class="placeholder">没有匹配的样本</div>`;
  }
}

// ── Sample List ──
function renderSampleList() {
  const list = document.getElementById('sample-list');
  list.innerHTML = '';
  const show = filteredIndices.slice(0, 500); // virtualize for perf
  show.forEach(idx => {
    const s = allSamples[idx];
    const div = document.createElement('div');
    const status = getStatusClass(s);
    div.className = `sample-item result-${status}${idx === currentIndex ? ' active' : ''}`;
    const tags = getDisplayTags(s).slice(0, 5).map(t => `<span class="mini-tag">${escHtml(t)}</span>`).join('');
    const summary = getRecordSummary(s);
    const err = getPrimaryError(s);
    div.innerHTML = `<div class="sid">${escHtml(getSampleId(s, idx))}</div>
      <div class="meta">${escHtml(summary)} · ${recordSources[idx] || '#' + (idx + 1)}</div>
      ${err ? `<div class="snippet">${escHtml(truncateText(err, 120))}</div>` : ''}
      ${tags ? '<div class="tags-row">' + tags + '</div>' : ''}`;
    div.onclick = () => selectSample(idx);
    list.appendChild(div);
  });
  if (filteredIndices.length > 500) {
    const tip = document.createElement('div');
    tip.style.cssText = 'padding:8px;color:var(--text2);font-size:10px';
    tip.textContent = `显示前 500 条，共 ${filteredIndices.length} 条匹配`;
    list.appendChild(tip);
  }
}

function selectSample(idx) {
  currentIndex = idx;
  renderSampleList();
  renderContent(idx);
  // scroll sidebar (defend against items beyond the 500 render cap)
  const items = document.querySelectorAll('.sample-item');
  const pos = filteredIndices.indexOf(idx);
  if (pos >= 0 && pos < items.length) items[pos].scrollIntoView({ block: 'nearest' });
}

// ── Content Rendering ──
function renderContent(idx) {
  const s = allSamples[idx];
  const inner = document.getElementById('content-inner');
  const result = getResultLabel(s);
  domIdSeq = 0;

  let bodyHtml = '';
  if (currentView === 'tree') {
    bodyHtml = renderJsonTree(s);
  } else if (currentView === 'flat') {
    bodyHtml = renderFlatView(s);
  } else {
    bodyHtml = `<pre class="raw-pre">${escHtml(JSON.stringify(s, null, 2))}</pre>`;
  }

  // summary
  const summaryItems = [];
  summaryItems.push({l:'Sample ID', v:getSampleId(s, idx)});
  if (recordSources[idx]) summaryItems.push({l:'Source', v:recordSources[idx]});
  if (getPath(s, 'expected_result') || getPath(s, 'case.expected_result')) summaryItems.push({l:'Expected Result', v:getPath(s, 'expected_result') ?? getPath(s, 'case.expected_result')});
  if (getPath(s, 'expected_status') || getPath(s, 'case.expected_status')) summaryItems.push({l:'Status', v:getPath(s, 'expected_status') ?? getPath(s, 'case.expected_status')});
  if (getDisplayTags(s).length) summaryItems.push({l:'Tags', v:getDisplayTags(s).join(', ')});
  if (getPrimaryError(s)) summaryItems.push({l:'Error', v:getPrimaryError(s), state:'fail', error:true});

  const evaluation = getEvaluation(s);
  const evaluationHtml = evaluation ? renderEvaluationSummary(evaluation) : '';

  // add pattern summaries if present
  const expectedPatterns = getPath(s, 'expected_patterns') || getPath(s, 'case.expected_patterns');
  if (expectedPatterns) {
    if (expectedPatterns.node_count != null) summaryItems.push({l:'节点数', v:expectedPatterns.node_count});
    if (expectedPatterns.edge_relations) summaryItems.push({l:'边关系', v:expectedPatterns.edge_relations.join(', ')});
    if (expectedPatterns.constraint_types) summaryItems.push({l:'约束类型', v:expectedPatterns.constraint_types.join(', ')});
  }
  const expectedFixPatterns = getPath(s, 'expected_fix_patterns') || getPath(s, 'case.expected_fix_patterns');
  if (expectedFixPatterns) {
    if (expectedFixPatterns.node_count != null) summaryItems.push({l:'修复节点数', v:expectedFixPatterns.node_count});
    if (expectedFixPatterns.edge_relations) summaryItems.push({l:'修复边关系', v:expectedFixPatterns.edge_relations.join(', ')});
    if (expectedFixPatterns.constraint_types) summaryItems.push({l:'修复约束类型', v:expectedFixPatterns.constraint_types.join(', ')});
  }

  const summaryHtml = summaryItems.map(item =>
    `<div class="summary-item ${item.state || ''}"><div class="label">${item.l}</div><div class="value ${item.error ? 'error-text' : ''}">${escHtml(String(item.v))}</div></div>`
  ).join('');

  inner.innerHTML = `
    ${lastParseErrors.length ? renderParseErrors() : ''}
    <div class="nav-row">
      <button class="btn" onclick="navPrev()" ${filteredIndices.indexOf(idx) <= 0 ? 'disabled' : ''}>◀ 上一条</button>
      <span class="pos">${filteredIndices.indexOf(idx) + 1} / ${filteredIndices.length}</span>
      <button class="btn" onclick="navNext()" ${filteredIndices.indexOf(idx) >= filteredIndices.length - 1 ? 'disabled' : ''}>下一条 ▶</button>
      <button class="btn" onclick="copySample(${idx})">📋 复制 JSON</button>
      <button class="btn" onclick="toggleAllNodes(false)" ${currentView !== 'tree' ? 'disabled' : ''}>展开全部</button>
      <button class="btn" onclick="toggleAllNodes(true)" ${currentView !== 'tree' ? 'disabled' : ''}>折叠全部</button>
    </div>
    <div class="summary-grid">${summaryHtml}</div>
    ${evaluationHtml}
    <div class="sample-card">
      <div class="card-header">
        <span class="card-title">📄 完整数据</span>
        <div class="card-badges">
          ${result ? `<span class="badge badge-${getStatusClass(s)}">${escHtml(result)}</span>` : ''}
          ${getDisplayTags(s).slice(0,6).map(t=>`<span class="badge badge-neutral">${escHtml(t)}</span>`).join('')}
        </div>
      </div>
      <div class="card-body">${bodyHtml}</div>
    </div>`;
}

// ── JSON Tree Renderer ──
function renderJsonTree(obj, depth = 0, path = '$') {
  // ── primitives ──
  if (obj === null) return '<span class="json-val-null">null</span>';
  if (typeof obj === 'boolean') return `<span class="json-val-bool">${obj}</span>`;
  if (typeof obj === 'number') {
    const formatted = Number.isInteger(obj) ? String(obj)
      : parseFloat(obj.toPrecision(6)).toString();
    return `<span class="json-val-number">${formatted}</span>`;
  }
  if (typeof obj === 'string') {
    const isLong = obj.length > 200;
    if (!isLong) return `<span class="json-val-string">"${escHtml(obj)}"</span>`;
    // Long string — render expandable preview + hidden full block
    const id = nextDomId('str');
    const preview = escHtml(obj.slice(0, 160)) + '<span class="json-trunc-hint">…</span>';
    const full = escHtml(obj);
    return `<span class="json-str-wrapper" id="${id}">`
      + `<span class="json-str-toggle" onclick="event.stopPropagation(); toggleString('${id}')" title="展开/折叠完整内容"></span>`
      + `<span class="json-str-preview json-val-string">"${preview}"</span>`
      + `<span class="json-type-pill">${obj.length} chars</span>`
      + `<span class="json-str-full"><pre>"${full}"</pre></span>`
      + `</span>`;
  }

  // ── array ──
  if (Array.isArray(obj)) {
    if (obj.length === 0) return '<span class="json-bracket json-bracket-empty">[ ]</span>';
    const id = nextDomId('node');
    const collapsed = depth >= 2 && obj.length > 12 ? ' collapsed' : '';
    let html = `<div class="json-node${collapsed}" id="${id}">`;
    // opening line
    html += `<div class="json-line json-line-open" title="${escHtml(path)}">`;
    html += `<span class="json-toggle" onclick="event.stopPropagation(); toggleNode('${id}')"></span>`;
    html += `<span class="json-bracket">[</span>`;
    html += `<span class="json-type-pill">${obj.length} items</span>`;
    html += `</div>`;
    // children (indent via .json-children → border-left guide line)
    html += '<div class="json-children">';
    obj.forEach((item, i) => {
      html += '<div class="json-line json-line-entry">';
      html += `<span class="json-key json-key-index" title="${escHtml(`${path}[${i}]`)}">${i}</span>`;
      html += `<span class="json-kv-sep">:</span>`;
      html += renderJsonTree(item, depth + 1, `${path}[${i}]`);
      if (i < obj.length - 1) html += '<span class="json-comma">,</span>';
      html += '</div>';
    });
    html += '</div>';
    // closing line
    html += `<div class="json-line json-line-close"><span class="json-bracket">]</span></div>`;
    html += '</div>';
    return html;
  }

  // ── object ──
  if (typeof obj === 'object') {
    const keys = orderObjectKeys(Object.keys(obj));
    if (keys.length === 0) return '<span class="json-bracket json-bracket-empty">{ }</span>';
    const id = nextDomId('node');
    const collapsed = depth >= 2 && keys.length > 10 ? ' collapsed' : '';
    let html = `<div class="json-node${collapsed}" id="${id}">`;
    // opening line
    html += `<div class="json-line json-line-open" title="${escHtml(path)}">`;
    html += `<span class="json-toggle" onclick="event.stopPropagation(); toggleNode('${id}')"></span>`;
    html += `<span class="json-bracket">{</span>`;
    html += `<span class="json-type-pill">${keys.length} keys</span>`;
    html += `</div>`;
    // children
    html += '<div class="json-children">';
    keys.forEach((key, i) => {
      const keyPath = `${path}.${key}`;
      html += '<div class="json-line json-line-entry">';
      html += `<span class="json-key" title="${escHtml(keyPath)}">"${escHtml(key)}"</span>`;
      html += `<span class="json-kv-sep">:</span>`;
      html += renderJsonTree(obj[key], depth + 1, keyPath);
      if (i < keys.length - 1) html += '<span class="json-comma">,</span>';
      html += '</div>';
    });
    html += '</div>';
    // closing line
    html += `<div class="json-line json-line-close"><span class="json-bracket">}</span></div>`;
    html += '</div>';
    return html;
  }

  return String(obj);
}

// ── Flat Table View ──
function renderFlatView(sample) {
  const flat = flattenObject(sample);
  let html = '<table class="flat-table"><thead><tr><th>Key Path</th><th>Value</th><th>Type</th></tr></thead><tbody>';
  for (const [key, val] of Object.entries(flat)) {
    const type = val === null ? 'null' : Array.isArray(val) ? 'array' : typeof val;
    html += `<tr><td style="color:var(--key)">${escHtml(key)}</td><td class="value-cell">${escHtml(formatFlatValue(val))}</td><td style="color:var(--text2)">${type}</td></tr>`;
  }
  html += '</tbody></table>';
  return html;
}

function flattenObject(obj, prefix = '') {
  const result = {};
  if (obj === null || typeof obj !== 'object') { result[prefix || '(root)'] = obj; return result; }
  if (Array.isArray(obj)) {
    obj.forEach((item, i) => {
      const key = prefix ? `${prefix}[${i}]` : `[${i}]`;
      if (typeof item === 'object' && item !== null) {
        Object.assign(result, flattenObject(item, key));
      } else {
        result[key] = item;
      }
    });
  } else {
    for (const [key, val] of Object.entries(obj)) {
      const fullKey = prefix ? `${prefix}.${key}` : key;
      if (typeof val === 'object' && val !== null && !Array.isArray(val)) {
        Object.assign(result, flattenObject(val, fullKey));
      } else if (Array.isArray(val) && val.length > 0 && typeof val[0] === 'object') {
        // arrays of objects: show as count + flatten each
        result[fullKey] = `[${val.length} items]`;
        val.forEach((item, i) => {
          if (typeof item === 'object' && item !== null) {
            Object.assign(result, flattenObject(item, `${fullKey}[${i}]`));
          } else {
            result[`${fullKey}[${i}]`] = item;
          }
        });
      } else if (Array.isArray(val)) {
        result[fullKey] = val;
      } else {
        result[fullKey] = val;
      }
    }
  }
  return result;
}

function nextDomId(prefix) {
  domIdSeq += 1;
  return `${prefix}_${domIdSeq}`;
}

function orderObjectKeys(keys) {
  const priority = [
    'sample_id', 'case', 'standard_instruction', 'nl_instruction',
    'expected_result', 'expected_status', 'tags', 'generation', 'parsed_plan',
    'evaluation', 'build_error', 'execution_error_type', 'error', 'report',
  ];
  return [...keys].sort((a, b) => {
    const ia = priority.indexOf(a);
    const ib = priority.indexOf(b);
    if (ia !== -1 || ib !== -1) {
      return (ia === -1 ? 999 : ia) - (ib === -1 ? 999 : ib);
    }
    return a.localeCompare(b);
  });
}

function collectSampleTags(sample) {
  const tags = new Set();
  const tagSources = [sample.tags, getPath(sample, 'case.tags')];
  tagSources.forEach(list => {
    if (Array.isArray(list)) list.forEach(t => tags.add(String(t)));
  });

  const expectedResult = getPath(sample, 'expected_result') ?? getPath(sample, 'case.expected_result');
  const expectedStatus = getPath(sample, 'expected_status') ?? getPath(sample, 'case.expected_status');
  if (expectedResult) tags.add(`result:${expectedResult}`);
  if (expectedStatus) tags.add(`status:${expectedStatus}`);

  const evaluation = getEvaluation(sample);
  if (evaluation && typeof evaluation === 'object') {
    for (const [key, val] of Object.entries(evaluation)) {
      if (typeof val === 'boolean') tags.add(`ev:${key}:${val}`);
    }
  }

  if (isPass(sample)) tags.add('pass');
  if (isFail(sample)) tags.add('fail');
  const errorType = getErrorType(sample);
  if (errorType) tags.add(`error:${errorType}`);
  return tags;
}

function getEvaluation(sample) {
  const ev = getPath(sample, 'evaluation');
  return ev && typeof ev === 'object' ? ev : null;
}

function getSampleId(sample, idx) {
  return String(
    sample.sample_id ||
    getPath(sample, 'case.sample_id') ||
    getPath(sample, 'generation.sample_id') ||
    getPath(sample, 'plan_id') ||
    `#${idx + 1}`
  );
}

function getResultLabel(sample) {
  if (hasHardError(sample)) return getErrorType(sample) || 'error';
  if (isPass(sample)) return 'pass';
  if (isFail(sample)) return 'fail';
  return String(
    getPath(sample, 'expected_result') ||
    getPath(sample, 'case.expected_result') ||
    getPath(sample, 'expected_status') ||
    getPath(sample, 'case.expected_status') ||
    ''
  );
}

function getStatusClass(sample) {
  if (hasHardError(sample)) return 'error';
  if (isPass(sample)) return 'pass';
  if (isFail(sample)) return 'fail';
  const label = getResultLabel(sample).toLowerCase();
  return label || 'neutral';
}

function getRecordSummary(sample) {
  const parts = [];
  const ev = getEvaluation(sample);
  if (ev && typeof ev.first_pass === 'boolean') parts.push(`first_pass=${ev.first_pass}`);
  if (ev && typeof ev.json_parse_ok === 'boolean') parts.push(`json=${ev.json_parse_ok}`);
  if (ev && typeof ev.schema_valid === 'boolean') parts.push(`schema=${ev.schema_valid}`);
  if (ev && typeof ev.build_success === 'boolean') parts.push(`build=${ev.build_success}`);
  if (!parts.length) {
    const result = getResultLabel(sample);
    if (result) parts.push(result);
  }
  return parts.length ? parts.join(' · ') : 'record';
}

function hasHardError(sample) {
  return !!getPrimaryError(sample);
}

function isPass(sample) {
  const ev = getEvaluation(sample);
  if (!ev) return false;
  if (typeof ev.first_pass === 'boolean') return ev.first_pass;
  const bools = Object.values(ev).filter(v => typeof v === 'boolean');
  return bools.length > 0 && bools.every(Boolean);
}

function isFail(sample) {
  if (hasHardError(sample)) return true;
  const ev = getEvaluation(sample);
  if (!ev) return false;
  if (typeof ev.first_pass === 'boolean') return !ev.first_pass;
  return Object.values(ev).some(v => v === false);
}

function getErrorType(sample) {
  const value = sample.execution_error_type || sample.error_type || getPath(sample, 'generation.error_type');
  if (!value) return '';
  const normalized = String(value);
  return normalized.toUpperCase() === 'SUCCESS' ? '' : normalized;
}

function getPrimaryError(sample) {
  const direct = sample.error || sample.build_error || getPath(sample, 'generation.error') || getPath(sample, 'generation.build_error');
  if (direct) return String(direct);
  const errorType = getErrorType(sample);
  return errorType || '';
}

function getDisplayTags(sample) {
  return [...collectSampleTags(sample)].filter(tag => !tag.startsWith('ev:')).sort((a, b) => {
    const pa = tagPriority(a), pb = tagPriority(b);
    if (pa !== pb) return pa - pb;
    return a.localeCompare(b);
  });
}

function getPath(obj, path) {
  if (!obj || !path) return undefined;
  const normalized = String(path).replace(/\[(\d+)\]/g, '.$1');
  const parts = normalized.split('.').filter(Boolean);
  let cur = obj;
  for (const part of parts) {
    if (cur == null || typeof cur !== 'object' || !(part in cur)) return undefined;
    cur = cur[part];
  }
  return cur;
}

function findValuesByKey(obj, key, limit = 20) {
  const values = [];
  const seen = new Set();
  function walk(value) {
    if (values.length >= limit || !value || typeof value !== 'object' || seen.has(value)) return;
    seen.add(value);
    if (Array.isArray(value)) {
      value.forEach(walk);
      return;
    }
    for (const [k, v] of Object.entries(value)) {
      if (k === key) values.push(v);
      walk(v);
    }
  }
  walk(obj);
  return values;
}

function matchesQuery(sample, idx, query) {
  const tokens = tokenizeQuery(query);
  return tokens.every(token => tokenMatches(sample, idx, token));
}

function tokenizeQuery(query) {
  return query.match(/"[^"]+"|'[^']+'|\S+/g)?.map(t => t.replace(/^['"]|['"]$/g, '')) || [];
}

function tokenMatches(sample, idx, token) {
  const negated = token.startsWith('!');
  const raw = negated ? token.slice(1) : token;
  let matched = false;

  if (raw === 'pass') matched = isPass(sample);
  else if (raw === 'fail' || raw === 'failed') matched = isFail(sample);
  else if (raw === 'error') matched = hasHardError(sample);
  else {
    const fieldMatch = raw.match(/^([A-Za-z0-9_.\[\]-]+)(:|=)(.*)$/);
    if (fieldMatch) {
      matched = fieldMatches(sample, fieldMatch[1], fieldMatch[3]);
    } else {
      matched = (searchCache[idx] || '').includes(raw.toLowerCase());
    }
  }
  return negated ? !matched : matched;
}

function fieldMatches(sample, field, expected) {
  const expectedLower = String(expected).toLowerCase();
  let values = [];
  const exact = getPath(sample, field);
  if (exact !== undefined) values = [exact];
  else if (!field.includes('.') && !field.includes('[')) values = findValuesByKey(sample, field);
  return values.some(value => stringifyValue(value).toLowerCase().includes(expectedLower));
}

function stringifyValue(value) {
  if (value === null) return 'null';
  if (typeof value === 'object') return JSON.stringify(value);
  return String(value);
}

function formatFlatValue(value) {
  return truncateText(stringifyValue(value), 1200);
}

function truncateText(text, limit) {
  const s = String(text);
  return s.length > limit ? s.slice(0, limit) + '...' : s;
}

function renderEvaluationSummary(evaluation) {
  const priority = [
    'first_pass', 'json_parse_ok', 'schema_valid', 'build_success',
    'builtgraph_success', 'l2_graph_pass', 'l3_expected_result',
    'node_complete', 'edge_complete', 'constraint_complete',
  ];
  const keys = Object.keys(evaluation).sort((a, b) => {
    const ia = priority.indexOf(a), ib = priority.indexOf(b);
    if (ia !== -1 || ib !== -1) return (ia === -1 ? 999 : ia) - (ib === -1 ? 999 : ib);
    return a.localeCompare(b);
  });
  const pills = keys.map(key => {
    const val = evaluation[key];
    const cls = typeof val === 'boolean' ? String(val) : '';
    return `<span class="kv-pill ${cls}">${escHtml(key)}=${escHtml(String(val))}</span>`;
  }).join('');
  return `<div class="sample-card">
    <div class="card-header"><span class="card-title">Evaluation</span></div>
    <div class="card-body" style="padding:10px 14px"><div class="summary-value-list">${pills}</div></div>
  </div>`;
}

function renderParseErrors() {
  const preview = lastParseErrors.slice(0, 5).map(escHtml).join('<br>');
  const more = lastParseErrors.length > 5 ? `<br>... 还有 ${lastParseErrors.length - 5} 条` : '';
  return `<div class="parse-error-box">部分行解析失败 (${lastParseErrors.length})<br>${preview}${more}</div>`;
}

function setQuickFilter(next) {
  quickFilter = next;
  updateQuickButtons();
  applyFilterNow();
}

function updateQuickButtons() {
  ['all', 'pass', 'fail', 'error'].forEach(name => {
    const el = document.getElementById(`quick-${name}`);
    if (el) el.classList.toggle('active', quickFilter === name);
  });
}

function clearFilters() {
  document.getElementById('search-input').value = '';
  selectedTags.clear();
  quickFilter = 'all';
  updateQuickButtons();
  buildTagFilters();
  applyFilterNow();
}

// ── Helpers ──
function toggleNode(id) {
  const node = document.getElementById(id);
  if (node) node.classList.toggle('collapsed');
}

function toggleString(id) {
  const node = document.getElementById(id);
  if (node) node.classList.toggle('expanded');
}

function toggleAllNodes(collapse) {
  document.querySelectorAll('#content-inner .json-node').forEach(node => {
    node.classList.toggle('collapsed', collapse);
  });
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function setView(view) {
  currentView = view;
  document.getElementById('btn-tree').classList.toggle('active', view === 'tree');
  document.getElementById('btn-flat').classList.toggle('active', view === 'flat');
  document.getElementById('btn-raw').classList.toggle('active', view === 'raw');
  if (currentIndex >= 0) renderContent(currentIndex);
}

function navPrev() {
  const pos = filteredIndices.indexOf(currentIndex);
  if (pos > 0) selectSample(filteredIndices[pos - 1]);
}
function navNext() {
  const pos = filteredIndices.indexOf(currentIndex);
  if (pos < filteredIndices.length - 1) selectSample(filteredIndices[pos + 1]);
}

function copySample(idx) {
  copyText(JSON.stringify(allSamples[idx], null, 2));
}

function copyText(text) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text);
    return;
  }
  const textarea = document.createElement('textarea');
  textarea.value = text;
  textarea.style.position = 'fixed';
  textarea.style.opacity = '0';
  document.body.appendChild(textarea);
  textarea.select();
  document.execCommand('copy');
  textarea.remove();
}

function exportFiltered() {
  if (allSamples.length === 0) { alert('请先加载 JSONL 文件'); return; }
  if (filteredIndices.length === 0) { alert('当前过滤结果为空，无需导出'); return; }
  const data = filteredIndices.map(i => allSamples[i]);
  const text = data.map(d => JSON.stringify(d)).join('\n');
  const blob = new Blob([text], {type: 'application/jsonl'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'filtered_export.jsonl'; a.click();
  URL.revokeObjectURL(url);
}

// ── Keyboard ──
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === 'ArrowDown' || e.key === 'j') { e.preventDefault(); navNext(); }
  if (e.key === 'ArrowUp' || e.key === 'k') { e.preventDefault(); navPrev(); }
  if (e.key === 't') setView('tree');
  if (e.key === 'f') setView('flat');
  if (e.key === 'r') setView('raw');
  if (e.key === '/' || e.key === 's') { e.preventDefault(); document.getElementById('search-input').focus(); }
});

// Init
document.getElementById('btn-tree').classList.add('active');
</script>
