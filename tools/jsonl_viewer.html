function getExtractedCode(sample) {
  return getPath(sample, 'generation.extracted_code')
      || getPath(sample, 'generation.extraction.code')
      || getPath(sample, 'generation.raw_response')
      || sample.final_code   // repair-loop: resolved code
      || sample.initial_code
      || '';
}

// final_dag 对应修复后的最终代码;解析模型侧同步约束时必须配套用它。
function getFinalCode(sample) {
  return sample.final_code || getExtractedCode(sample);
}

function getLayer(report, n) {
  return (Array.isArray(report.layers) ? report.layers : []).find(l => l && l.layer === n) || null;
}

function getCriticalPath(report) {
  const l2 = getLayer(report, 2);
  const cp = l2 && l2.details && Array.isArray(l2.details.critical_path) ? l2.details.critical_path : [];
  return new Set(cp);
}

function fmtMs(ms) {
  const n = Number(ms);
  if (!isFinite(n)) return String(ms);
  if (n < 1) return n.toFixed(3) + ' ms';
  if (n < 1000) return n.toFixed(1) + ' ms';
  return (n / 1000).toFixed(2) + ' s';
}

// Deterministic per-actor hue so the same fleet keeps one colour across panels.
function actorColor(actor) {
  const s = String(actor || '');
  if (!s) return 'hsl(220, 14%, 60%)';
  let h = 0;
  for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) % 360;
  return `hsl(${h}, 58%, 68%)`;
}

// Recover task nodes + dependency edges from generated GCJP code (edges are not in the report JSON).
function parseGcjpCode(code) {
  const nodes = [];
  const edges = [];
  if (!code || typeof code !== 'string') return {nodes, edges};
  const Q = `["']`;
  const taskRe = new RegExp(`add_task\\(\\s*${Q}([^"']+)${Q}([^)]*)\\)`, 'g');
  let m;
  while ((m = taskRe.exec(code)) !== null) {
    const rest = m[2] || '';
    const grab = key => {
      const km = new RegExp(`${key}\\s*=\\s*${Q}([^"']*)${Q}`).exec(rest);
      return km ? km[1] : '';
    };
    nodes.push({id: m[1], actor: grab('actor'), action: grab('action'), target: grab('target')});
  }
  const depRe = new RegExp(`add_dependency\\(\\s*${Q}([^"']+)${Q}\\s*,\\s*${Q}([^"']+)${Q}([^)]*)\\)`, 'g');
  while ((m = depRe.exec(code)) !== null) {
    const rest = m[3] || '';
    const relM = new RegExp(`relation\\s*=\\s*${Q}([^"']*)${Q}`).exec(rest);
    const condM = new RegExp(`condition\\s*=\\s*${Q}([^"']*)${Q}`).exec(rest);
    edges.push({src: m[1], dst: m[2], relation: relM ? relM[1] : '', condition: condM ? condM[1] : ''});
  }
  return {nodes, edges};
}

function renderReportBanner(sample, report) {
  const passed = !!report.overall_passed;
  const seg = report.segment_id || getSampleId(sample, 0);
  const expected = getPath(sample, 'case.expected_result') ?? getPath(sample, 'expected_result');
  const l3 = getLayer(report, 3);
  const actual = l3 && l3.details ? l3.details.z3_result : undefined;
  const total = report.total_elapsed_ms;
  const pills = [];
  if (expected != null) {
    const ok = actual == null || String(expected).toLowerCase() === String(actual).toLowerCase();
    pills.push(`<span class="kv-pill ${ok ? 'true' : 'false'}">期望 ${escHtml(String(expected))}${actual != null ? ` · 实际 ${escHtml(String(actual))}` : ''}</span>`);
  } else if (actual != null) {
    pills.push(`<span class="kv-pill">Z3 ${escHtml(String(actual))}</span>`);
  }
  if (typeof total === 'number') pills.push(`<span class="kv-pill">⏱ ${fmtMs(total)}</span>`);
  return `<div class="report-banner ${passed ? 'pass' : 'fail'}">
    <span class="verdict">${passed ? '✓ PASS' : '✗ FAIL'}</span>
    <span class="seg">${escHtml(String(seg))}</span>
    <span class="meta-pills">${pills.join('')}</span>
  </div>`;
}

function layerDetailLine(l) {
  const d = l.details || {};
  switch (l.layer) {
    case 1: {
      const bits = [`error_type=${escHtml(String(d.error_type ?? '—'))}`];
      if (Array.isArray(d.warnings) && d.warnings.length) bits.push(`${d.warnings.length} warnings`);
      if (Array.isArray(d.violations) && d.violations.length) bits.push(`${d.violations.length} violations`);
      return bits.join(' · ');
    }
    case 2: {
      let s = `${d.node_count ?? '?'} nodes · ${d.edge_count ?? '?'} edges · DAG=${d.is_dag}`;
      if (d.critical_path_length != null) s += ` · 关键路径 ${escHtml(String(d.critical_path_length))}`;
      return s;
    }
    case 3:
      if (d.z3_result === 'sat') return `z3=sat · ${d.tasks_scheduled ?? '?'} 个任务已排期`;
      if (d.z3_result === 'unsat') {
        const n = Array.isArray(d.unsat_core_semantic) ? d.unsat_core_semantic.length
                : (Array.isArray(d.unsat_core) ? d.unsat_core.length : 0);
        return `z3=unsat · ${n} 条语义冲突`;
      }
      return d.z3_result ? `z3=${escHtml(String(d.z3_result))}` : '';
    case 4:
      return d.status ? escHtml(String(d.status)) : '';
    default:
      return '';
  }
}

function renderLayerPipeline(report) {
  const layers = Array.isArray(report.layers) ? report.layers : [];
  if (!layers.length) return '';
  const cards = layers.map(l => {
    const passed = !!l.passed;
    const detail = layerDetailLine(l);
    return `<div class="layer-card ${passed ? 'passed' : 'failed'}">
      <div class="lc-head"><span class="lc-icon">${passed ? '✓' : '✗'}</span><span class="lc-name">L${escHtml(String(l.layer ?? '?'))} ${escHtml(String(l.name || ''))}</span></div>
      ${detail ? `<div class="lc-detail">${detail}</div>` : ''}
      ${l.error_msg ? `<div class="lc-err">${escHtml(String(l.error_msg))}</div>` : ''}
      <div class="lc-time">⏱ ${fmtMs(l.elapsed_ms)}</div>
    </div>`;
  });
  return `<div class="report-section">
    <div class="sec-title">🔬 分层验证管线</div>
    <div class="layer-pipe">${cards.join('<div class="layer-arrow">▶</div>')}</div>
  </div>`;
}

function renderGantt(report, parsed, critical) {
  const schedule = report.schedule && typeof report.schedule === 'object' ? report.schedule : {};
  const entries = Object.entries(schedule).filter(([, v]) => v && typeof v === 'object');
  const sec = inner => `<div class="report-section"><div class="sec-title">📅 调度甘特图</div>${inner}</div>`;
  if (!entries.length) {
    return sec(`<div class="gantt"><div class="gantt-empty">无可行调度（UNSAT 或未排期）</div></div>`);
  }
  entries.sort((a, b) => (Number(a[1].start) || 0) - (Number(b[1].start) || 0));
  const l2 = getLayer(report, 2);
  const cpLen = l2 && l2.details ? l2.details.critical_path_length : null;
  let maxEnd = 0;
  entries.forEach(([, v]) => { maxEnd = Math.max(maxEnd, Number(v.end) || 0); });
  if (cpLen != null) maxEnd = Math.max(maxEnd, Number(cpLen) || 0);
  if (maxEnd <= 0) maxEnd = 1;
  const actorOf = {};
  parsed.nodes.forEach(n => { actorOf[n.id] = n.actor; });
  const round = x => parseFloat(Number(x).toFixed(2));
  const calcLeft = frac => `calc(140px + ${frac} * (100% - 140px))`;

  const tickCount = 5;
  let ticks = '';
  for (let i = 0; i <= tickCount; i++) {
    ticks += `<span class="gantt-tick" style="left: ${calcLeft(i / tickCount)}">${round(maxEnd * i / tickCount)}</span>`;
  }
  const rows = entries.map(([id, v]) => {
    const start = Number(v.start) || 0;
    const end = Number(v.end) || 0;
    const dur = v.duration != null ? Number(v.duration) : (end - start);
    const left = start / maxEnd * 100;
    const width = Math.max(dur / maxEnd * 100, 1.5);
    const crit = critical.has(id) ? ' critical' : '';
    const tip = `${id}: ${round(start)} → ${round(end)} (dur ${round(dur)})`;
    return `<div class="gantt-row">
      <div class="gantt-label" title="${escHtml(id)}">${escHtml(id)}</div>
      <div class="gantt-track">
        <div class="gantt-bar${crit}" style="left:${left}%; width:${width}%; background:${actorColor(actorOf[id])}" title="${escHtml(tip)}">${round(dur)}</div>
      </div>
    </div>`;
  });
  let makespan = '';
  if (cpLen != null && Number(cpLen) > 0) {
    const frac = Math.min(Number(cpLen) / maxEnd, 1);
    makespan = `<div class="gantt-makespan" style="left: ${calcLeft(frac)}"><span class="ms-label">makespan ${round(cpLen)}</span></div>`;
  }
  return sec(`<div class="gantt">
    <div class="gantt-axis">${ticks}</div>
    <div class="gantt-body">${rows.join('')}${makespan}</div>
  </div>`);
}

function renderAttribution(report) {
  const l3 = getLayer(report, 3);
  const d = (l3 && l3.details) || {};
  const pick = key => (Array.isArray(report[key]) && report[key].length) ? report[key]
                    : (Array.isArray(d[key]) ? d[key] : []);
  const attribution = pick('attribution');
  const semantic = pick('unsat_core_semantic');
  const framework = pick('unsat_core_framework');
  if (!attribution.length && !semantic.length) return '';
  const cards = attribution.map(a =>
    `<div class="attribution-card"><span class="ac-icon">⚠</span><span>${escHtml(String(a))}</span></div>`).join('');
  let chips = '';
  if (semantic.length) {
    chips += `<div class="unsat-sub">语义冲突约束 (${semantic.length})</div><div class="unsat-chips">`
      + semantic.map(c => `<span class="unsat-chip semantic">${escHtml(String(c))}</span>`).join('') + `</div>`;
  }
  if (framework.length) {
    chips += `<div class="unsat-sub">框架约束 (${framework.length})</div><div class="unsat-chips">`
      + framework.map(c => `<span class="unsat-chip framework">${escHtml(String(c))}</span>`).join('') + `</div>`;
  }
  return `<div class="report-section">
    <div class="sec-title">❌ 不可满足约束归因 (UNSAT)</div>
    <div class="attribution-list">${cards}</div>
    ${chips}
  </div>`;
}

// ── DAG 数据抽取 / 模型-真值 diff / SVG 渲染 ──────────────────────────────
// final_dag 与 expected_graph 同构:{nodes:[{task_id,actor,action,target}], edges:[{source,target,relation,condition}]}
function normalizeGraph(raw) {
  if (!raw || typeof raw !== 'object' || Array.isArray(raw)) return null;
  const nodes = (Array.isArray(raw.nodes) ? raw.nodes : []).map(n => ({
    id: String(n.task_id ?? n.id ?? ''),
    actor: n.actor || '', action: n.action || '', target: n.target || '',
  })).filter(n => n.id);
  const edges = (Array.isArray(raw.edges) ? raw.edges : []).map(e => ({
    src: String(e.source ?? e.src ?? ''), dst: String(e.target ?? e.dst ?? ''),
    relation: e.relation || '', condition: e.condition || '',
  })).filter(e => e.src && e.dst);
  if (!nodes.length) return null;
  return {nodes, edges};
}

function getModelGraph(sample) {
  const direct = normalizeGraph(sample.final_dag);
  if (direct) return {graph: direct, source: 'final_dag'};
  const parsed = parseGcjpCode(getExtractedCode(sample));
  if (parsed.nodes.length) return {graph: parsed, source: 'code'};
  const self = normalizeGraph(sample);  // 直接浏览 final_dag/*.json 文件本身
  if (self) return {graph: self, source: 'graph json'};
  return null;
}

function getExpectedGraphData(sample) {
  return normalizeGraph(getPath(sample, 'case.expected_graph') || sample.expected_graph);
}

// 解析最终代码中的 standalone 同步约束(add_sync_constraint / add_group_sync_constraint)
function parseSyncFromCode(code) {
  const groups = [];
  if (!code || typeof code !== 'string') return groups;
  const Q = `["']`;
  let m;
  const pairRe = new RegExp(`add_sync_constraint\\(\\s*${Q}([^"']+)${Q}\\s*,\\s*${Q}([^"']+)${Q}([^)]*)\\)`, 'g');
  while ((m = pairRe.exec(code)) !== null) {
    const tol = /tolerance\s*=\s*([0-9.]+)/.exec(m[3] || '');
    groups.push({ids: [m[1], m[2]], tol: tol ? parseFloat(tol[1]) : null});
  }
  const grpRe = /add_group_sync_constraint\(\s*\[([^\]]*)\]([^)]*)\)/g;
  while ((m = grpRe.exec(code)) !== null) {
    const ids = [...m[1].matchAll(/["']([^"']+)["']/g)].map(x => x[1]);
    const tol = /tolerance\s*=\s*([0-9.]+)/.exec(m[2] || '');
    if (ids.length >= 2) groups.push({ids, tol: tol ? parseFloat(tol[1]) : null});
  }
  return groups;
}

function getSyncGroups(sample, side) {
  const groups = [];
  if (side === 'model') {
    parseSyncFromCode(getFinalCode(sample)).forEach(g => groups.push(g));
  } else {
    const plan = getPath(sample, 'case.canonical_task_plan') || sample.canonical_task_plan || {};
    (Array.isArray(plan.explicit_constraints) ? plan.explicit_constraints : []).forEach(c => {
      if (c && c.type === 'group_sync' && Array.isArray(c.task_ids) && c.task_ids.length >= 2) {
        groups.push({ids: c.task_ids.map(String), tol: c.tolerance ?? null});
      }
    });
    (Array.isArray(plan.relations) ? plan.relations : []).forEach(r => {
      if (r && r.type === 'sync') {
        groups.push({ids: [String(r.source), String(r.target)], tol: r.sync_tolerance ?? null});
      }
    });
  }
  return dedupeSyncGroups(groups);
}

function dedupeSyncGroups(groups) {
  const seen = new Map();
  groups.forEach(g => {
    const k = [...g.ids].sort().join('|');
    const prev = seen.get(k);
    if (!prev || (prev.tol == null && g.tol != null)) seen.set(k, g);
  });
  return [...seen.values()];
}

const syncPairKey = (a, b) => [a, b].sort().join(' ↔ ');
const edgeKeyOf = e => `${e.src}→${e.dst}|${e.relation}`;

// 同步语义统一展开为无序任务对(sync 边 ≡ sync 约束 ≡ group_sync,互认)→ Map<pairKey, tol>
function expandSyncPairs(graph, groups) {
  const pairs = new Map();
  const add = (a, b, tol) => {
    const k = syncPairKey(a, b);
    if (!pairs.has(k) || (pairs.get(k) == null && tol != null)) pairs.set(k, tol ?? null);
  };
  (graph ? graph.edges : []).forEach(e => { if (e.relation === 'sync') add(e.src, e.dst, null); });
  (groups || []).forEach(g => {
    for (let i = 0; i < g.ids.length; i++)
      for (let j = i + 1; j < g.ids.length; j++) add(g.ids[i], g.ids[j], g.tol);
  });
  return pairs;
}

// 与 Python 侧 dag_exact(experiments/phase1_common.py)同口径的前端 diff
function graphDiff(model, gt, syncM, syncG) {
  const mEdges = new Set(model.edges.filter(e => e.relation !== 'sync').map(edgeKeyOf));
  const gEdges = new Set(gt.edges.filter(e => e.relation !== 'sync').map(edgeKeyOf));
  const missingEdges = new Set([...gEdges].filter(k => !mEdges.has(k)));
  const extraEdges = new Set([...mEdges].filter(k => !gEdges.has(k)));
  const mPairs = expandSyncPairs(model, syncM);
  const gPairs = expandSyncPairs(gt, syncG);
  const missingSync = new Set([...gPairs.keys()].filter(k => !mPairs.has(k)));
  const extraSync = new Set([...mPairs.keys()].filter(k => !gPairs.has(k)));
  const tolMismatch = [...gPairs.keys()].filter(k =>
    mPairs.has(k) && gPairs.get(k) != null && mPairs.get(k) != null
    && Number(gPairs.get(k)) !== Number(mPairs.get(k)));
  const sig = g => { const m = new Map(); g.nodes.forEach(n => m.set(n.id, `${n.actor}|${n.action}|${n.target}`)); return m; };
  const mN = sig(model), gN = sig(gt);
  const nodeDiff = [];
  gN.forEach((v, k) => { if (mN.get(k) !== v) nodeDiff.push(k); });
  mN.forEach((_, k) => { if (!gN.has(k)) nodeDiff.push(`${k} (多余)`); });
  const verdict = !missingEdges.size && !extraEdges.size && !missingSync.size
    && !extraSync.size && !tolMismatch.length && !nodeDiff.length;
  return {missingEdges, extraEdges, missingSync, extraSync, tolMismatch, nodeDiff, verdict};
}

// 渲染单个 DAG 为 SVG。graph 为 normalize 后格式;syncGroups 画成橙色虚线连接。
// opts: {critical:Set, edgeClass:fn(edge)→''/'extra'/'missing', syncClass:fn(pairKey)→同}
function renderDagSvg(graph, syncGroups, opts = {}) {
  const critical = opts.critical || new Set();
  const edgeClass = opts.edgeClass || (() => '');
  const syncClass = opts.syncClass || (() => '');
  const nodes = graph.nodes.slice();
  if (!nodes.length) return '';
  const ids = new Set(nodes.map(n => n.id));
  const edges = graph.edges.filter(e => e.relation !== 'sync' && ids.has(e.src) && ids.has(e.dst));
  const syncEdgeGroups = graph.edges
    .filter(e => e.relation === 'sync' && ids.has(e.src) && ids.has(e.dst))
    .map(e => ({ids: [e.src, e.dst], tol: null}));
  const groups = dedupeSyncGroups([...(syncGroups || []), ...syncEdgeGroups])
    .map(g => ({...g, ids: g.ids.filter(id => ids.has(id))}))
    .filter(g => g.ids.length >= 2);

  // 无有向边、无同步、节点无属性 → 退化为文本链
  if (!edges.length && !groups.length && nodes.every(n => !n.actor && !n.action)) {
    const chain = nodes.map(n => `<span class="dag-chain-node">${escHtml(n.id)}</span>`)
      .join('<span class="dag-chain-arrow">→</span>');
    return `<div class="dag-chain">${chain}</div>`;
  }

  // Longest-path layering(无有向边时全部 depth=0 → 单列排布,同步组照画)
  const depth = {};
  nodes.forEach(n => { depth[n.id] = 0; });
  let changed = true, guard = 0;
  while (changed && guard++ < nodes.length + 2) {
    changed = false;
    edges.forEach(e => {
      if (depth[e.dst] < depth[e.src] + 1) { depth[e.dst] = depth[e.src] + 1; changed = true; }
    });
  }
  const cols = {};
  nodes.forEach(n => { (cols[depth[n.id]] = cols[depth[n.id]] || []).push(n); });
  const colKeys = Object.keys(cols).map(Number).sort((a, b) => a - b);
  const NODE_W = 132, NODE_H = 44, COL_GAP = 64, ROW_GAP = 26, PAD = 10;
  const pos = {};
  let maxRows = 0;
  colKeys.forEach((k, i) => {
    cols[k].forEach((n, r) => { pos[n.id] = {x: i * (NODE_W + COL_GAP) + PAD, y: r * (NODE_H + ROW_GAP) + PAD}; });
    maxRows = Math.max(maxRows, cols[k].length);
  });
  const syncBow = groups.length ? 46 : 0;  // 同步弧线在右侧需要额外画布宽度
  const width = colKeys.length * (NODE_W + COL_GAP) - COL_GAP + 2 * PAD + syncBow;
  const height = maxRows * (NODE_H + ROW_GAP) - ROW_GAP + 2 * PAD;
  const markerId = `dag-arrow-${++domIdSeq}`;

  const edgeSvg = edges.map(e => {
    const a = pos[e.src], b = pos[e.dst];
    if (!a || !b) return '';
    const x1 = a.x + NODE_W, y1 = a.y + NODE_H / 2;
    const x2 = b.x, y2 = b.y + NODE_H / 2;
    const mx = (x1 + x2) / 2;
    const cls = edgeClass(e);
    const crit = (!cls && critical.has(e.src) && critical.has(e.dst)) ? ' critical' : '';
    const labelText = [e.relation, e.condition ? truncateText(String(e.condition), 20) : '']
      .filter(Boolean).join(': ');
    const label = labelText
      ? `<text class="dag-edge-label ${cls}" x="${mx}" y="${(y1 + y2) / 2 - 4}" text-anchor="middle">${escHtml(labelText)}</text>`
      : '';
    return `<path class="dag-edge${crit} ${cls}" d="M ${x1} ${y1} C ${mx} ${y1}, ${mx} ${y2}, ${x2} ${y2}" marker-end="url(#${markerId})"/>${label}`;
  }).join('');

  // 同步组:组内相邻成员间的右弓形虚线(无向、无箭头)+ sync±tol 标签
  const syncSvg = groups.map(g => {
    const members = g.ids.filter(id => pos[id]);
    if (members.length < 2) return '';
    const tolLabel = g.tol != null ? `sync±${g.tol}` : 'sync';
    let parts = '';
    for (let i = 0; i + 1 < members.length; i++) {
      const a = pos[members[i]], b = pos[members[i + 1]];
      const k = syncClass(syncPairKey(members[i], members[i + 1]));
      const x1 = a.x + NODE_W, y1 = a.y + NODE_H / 2;
      const x2 = b.x + NODE_W, y2 = b.y + NODE_H / 2;
      const bow = Math.max(x1, x2) + 38;
      parts += `<path class="dag-edge sync ${k}" d="M ${x1} ${y1} C ${bow} ${y1}, ${bow} ${y2}, ${x2} ${y2}"/>`;
      if (i === 0) {
        parts += `<text class="dag-edge-label sync ${k}" x="${bow + 3}" y="${(y1 + y2) / 2 + 3}" text-anchor="start">${escHtml(tolLabel)}</text>`;
      }
    }
    return parts;
  }).join('');

  const nodeSvg = nodes.map(n => {
    const p = pos[n.id];
    const crit = critical.has(n.id) ? ' critical' : '';
    const sub = [n.action, n.target].filter(Boolean).join(' · ');
    const fill = n.actor ? actorColor(n.actor) : 'var(--elevated)';
    return `<g class="dag-node${crit}" transform="translate(${p.x},${p.y})">
      <rect class="dag-node-rect" width="${NODE_W}" height="${NODE_H}" rx="6" style="fill:${fill};fill-opacity:.22"/>
      <text class="dag-node-id" x="9" y="19">${escHtml(truncateText(n.id, 18))}</text>
      ${sub ? `<text class="dag-node-sub" x="9" y="34">${escHtml(truncateText(sub, 22))}</text>` : ''}
    </g>`;
  }).join('');

  return `<svg width="${width}" height="${height}" viewBox="0 0 ${width} ${height}" xmlns="http://www.w3.org/2000/svg">
    <defs><marker id="${markerId}" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="var(--border2)"/></marker></defs>
    ${edgeSvg}${syncSvg}${nodeSvg}
  </svg>`;
}

// 并排对比:模型输出 DAG vs Ground Truth DAG(边集差异高亮 + 精确匹配徽标)
function renderDagCompare(sample, critical = new Set()) {
  const model = getModelGraph(sample);
  const gt = getExpectedGraphData(sample);
  if (!model && !gt) return '';

  const syncM = model ? getSyncGroups(sample, 'model') : [];
  const syncG = gt ? getSyncGroups(sample, 'gt') : [];

  let verdictRow = '', legendDiff = '';
  let modelOpts = {critical};
  let gtOpts = {};
  if (model && gt) {
    const diff = graphDiff(model.graph, gt, syncM, syncG);
    const evDag = getPath(sample, 'evaluation.final_dag_exact');
    const exact = (typeof evDag === 'boolean') ? evDag : diff.verdict;
    const bits = [];
    if (diff.missingEdges.size) bits.push(`缺 ${diff.missingEdges.size} 边`);
    if (diff.extraEdges.size) bits.push(`多 ${diff.extraEdges.size} 边`);
    if (diff.missingSync.size) bits.push(`缺同步 ${diff.missingSync.size} 对`);
    if (diff.extraSync.size) bits.push(`多同步 ${diff.extraSync.size} 对`);
    if (diff.tolMismatch.length) bits.push(`tolerance 不一致 ${diff.tolMismatch.length}`);
    if (diff.nodeDiff.length) bits.push(`节点差异: ${diff.nodeDiff.slice(0, 4).join(', ')}`);
    verdictRow = `<div class="dag-verdict-row">
      <span class="kv-pill ${exact ? 'true' : 'false'}">${exact ? '✓ DAG 精确匹配' : '✗ 存在差异'}</span>
      ${bits.length ? `<span class="kv-pill false">${escHtml(bits.join(' · '))}</span>` : ''}
      ${typeof evDag === 'boolean' ? `<span class="kv-pill">评分器 dag_exact=${evDag}</span>` : ''}
    </div>`;
    modelOpts = {critical, edgeClass: e => diff.extraEdges.has(edgeKeyOf(e)) ? 'extra' : '',
                 syncClass: k => diff.extraSync.has(k) ? 'extra' : ''};
    gtOpts = {edgeClass: e => diff.missingEdges.has(edgeKeyOf(e)) ? 'missing' : '',
              syncClass: k => diff.missingSync.has(k) ? 'missing' : ''};
    if (!exact || diff.extraEdges.size || diff.missingEdges.size || diff.extraSync.size || diff.missingSync.size) {
      legendDiff = `<span><span class="sw extra"></span>模型多余(左图红)</span>
        <span><span class="sw missing"></span>模型缺失(右图橙虚)</span>`;
    }
  }

  const panel = (title, srcNote, inner) => `<div class="dag-panel">
    <div class="dag-panel-title">${title}${srcNote ? `<span class="dag-src">${escHtml(srcNote)}</span>` : ''}</div>
    <div class="dag-wrap">${inner}</div>
  </div>`;

  const panels = [];
  if (model) panels.push(panel('🤖 模型输出', `来源: ${model.source}`, renderDagSvg(model.graph, syncM, modelOpts)));
  if (gt) panels.push(panel('🎯 Ground Truth', 'expected_graph', renderDagSvg(gt, syncG, gtOpts)));

  const legend = `<div class="dag-legend">
    <span><span class="sw"></span>依赖边(箭头)</span>
    <span><span class="sw sync"></span>同步组 sync±tol</span>
    ${legendDiff}
  </div>`;

  const title = (model && gt) ? '🔗 任务结构对比(模型 vs 真值)' : '🔗 任务依赖图';
  return `<div class="report-section"><div class="sec-title">${title}</div>${verdictRow}<div class="dag-compare">${panels.join('')}</div>${legend}</div>`;
}

function renderGeneratedCode(sample) {
  const code = getExtractedCode(sample);
  if (!code) return '';
  const id = nextDomId('code');
  return `<div class="report-section">
    <div class="sec-title">🐍 生成代码 (GCJP)</div>
    <div class="code-block">
      <button class="btn copy-btn" onclick="copyText(document.getElementById('${id}').textContent)">📋 复制</button>
      <pre id="${id}">${escHtml(code)}</pre>
    </div>
  </div>`;
}

function renderRepairAttempts(sample) {
  const attempts = sample && Array.isArray(sample.attempts) ? sample.attempts : [];
  if (!attempts.length) return '';
  const items = attempts.map((a, i) => {
    const rep = getPath(a, 'evaluation.report') || (a && a.report);
    const code = getPath(a, 'generation.repaired_code')
              || getPath(a, 'generation.extraction.code')
              || getPath(a, 'generation.raw_response')
              || (a && (a.repaired_code || a.code)) || '';
    const round = a && a.repair_round != null ? a.repair_round : i + 1;
    return {round, passed: !!(rep && rep.overall_passed), code, id: nextDomId('repair')};
  });
  const chips = items.map(it =>
    `<div class="repair-chip ${it.passed ? 'pass' : 'fail'}" onclick="toggleRepair('${it.id}')">
      <span class="rc-title">尝试 #${it.round}</span>
      <span class="rc-status">${it.passed ? '✓ 通过' : '✗ 未通过'}</span>
    </div>`).join('');
  const details = items.filter(it => it.code).map(it =>
    `<div class="repair-detail" id="${it.id}"><div class="code-block"><pre>${escHtml(String(it.code))}</pre></div></div>`).join('');
  return `<div class="report-section">
    <div class="sec-title">🔧 修复迭代 (${attempts.length})</div>
    <div class="repair-timeline">${chips}</div>
    ${details}
  </div>`;
}

function toggleRepair(id) {
  const el = document.getElementById(id);
  if (el) el.classList.toggle('open');
}

function renderParseErrors() {
  const preview = lastParseErrors.slice(0, 5).map(escHtml).join('<br>');
  const more = lastParseErrors.length > 5 ? `<br>... 还有 ${lastParseErrors.length - 5} 条` : '';
  return `<div class="parse-error-box">部分行解析失败 (${lastParseErrors.length})<br>${preview}${more}</div>`;
}

function setQuickFilter(next) {
  quickFilter = next;
  updateQuickButtons();
  applyFilterNow();
}

function updateQuickButtons() {
  ['all', 'pass', 'fail', 'error'].forEach(name => {
    const el = document.getElementById(`quick-${name}`);
    if (el) el.classList.toggle('active', quickFilter === name);
  });
}

function clearFilters() {
  document.getElementById('search-input').value = '';
  selectedTags.clear();
  quickFilter = 'all';
  updateQuickButtons();
  buildTagFilters();
  applyFilterNow();
}

// ── Helpers ──
function toggleNode(id) {
  const node = document.getElementById(id);
  if (node) node.classList.toggle('collapsed');
}

function toggleString(id) {
  const node = document.getElementById(id);
  if (node) node.classList.toggle('expanded');
}

function toggleAllNodes(collapse) {
  document.querySelectorAll('#content-inner .json-node').forEach(node => {
    node.classList.toggle('collapsed', collapse);
  });
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function syncViewButtons() {
  const map = {tree: 'btn-tree', flat: 'btn-flat', raw: 'btn-raw', report: 'btn-report'};
  Object.entries(map).forEach(([view, id]) => {
    const el = document.getElementById(id);
    if (el) el.classList.toggle('active', currentView === view);
  });
}

function setView(view) {
  currentView = view;
  syncViewButtons();
  if (currentIndex >= 0) renderContent(currentIndex);
}

function navPrev() {
  const pos = filteredIndices.indexOf(currentIndex);
  if (pos > 0) selectSample(filteredIndices[pos - 1]);
}
function navNext() {
  const pos = filteredIndices.indexOf(currentIndex);
  if (pos < filteredIndices.length - 1) selectSample(filteredIndices[pos + 1]);
}

function copySample(idx) {
  copyText(JSON.stringify(allSamples[idx], null, 2));
}

function copyText(text) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text);
    return;
  }
  const textarea = document.createElement('textarea');
  textarea.value = text;
  textarea.style.position = 'fixed';
  textarea.style.opacity = '0';
  document.body.appendChild(textarea);
  textarea.select();
  document.execCommand('copy');
  textarea.remove();
}

function exportFiltered() {
  if (allSamples.length === 0) { alert('请先加载 JSONL 文件'); return; }
  if (filteredIndices.length === 0) { alert('当前过滤结果为空，无需导出'); return; }
  const data = filteredIndices.map(i => allSamples[i]);
  const text = data.map(d => JSON.stringify(d)).join('\n');
  const blob = new Blob([text], {type: 'application/jsonl'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'filtered_export.jsonl'; a.click();
  URL.revokeObjectURL(url);
}

// ── Keyboard ──
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === 'ArrowDown' || e.key === 'j') { e.preventDefault(); navNext(); }
  if (e.key === 'ArrowUp' || e.key === 'k') { e.preventDefault(); navPrev(); }
  if (e.key === 't') setView('tree');
  if (e.key === 'f') setView('flat');
  if (e.key === 'r') setView('raw');
  if (e.key === '/' || e.key === 's') { e.preventDefault(); document.getElementById('search-input').focus(); }
});

// Init
syncViewButtons();
</script>
</body>
